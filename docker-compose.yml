services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: financial_db
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${tb.bancodedados}
    ports:
      - "5431:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"